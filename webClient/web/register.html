<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Wishlist App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="form-container">
            <h2>Создать аккаунт</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="Иван">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required 
                           minlength="6" placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Подтверждение пароля</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           minlength="6" placeholder="Повторите пароль">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
            </form>
            <p class="text-center mt-20" style="color: var(--text-secondary);">
                Уже есть аккаунт? 
                <a href="/login" style="color: var(--primary-color);">Войти</a>
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Auth !== 'undefined') {
                Auth.init();
            }
            if (typeof loadFooter !== 'undefined') {
                loadFooter();
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (typeof Components === 'undefined') {
                alert('Ошибка загрузки модулей');
                return;
            }
            
            if (password !== confirmPassword) {
                Components.showAlert('Пароли не совпадают', 'error');
                return;
            }
            
            if (typeof Auth !== 'undefined') {
                const result = await Auth.register(email, password, name);
                
                if (result.success) {
                    Components.showAlert('Регистрация успешна! Теперь вы можете войти.', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    Components.showAlert(result.error, 'error');
                }
            }
        });
    </script>
</body>
</html>
