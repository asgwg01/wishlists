<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Wishlist App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="form-container">
            <h2>Добро пожаловать!</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Войти</button>
            </form>
            <p class="text-center mt-20" style="color: var(--text-secondary);">
                Нет аккаунта? 
                <a href="/register" style="color: var(--primary-color);">Зарегистрироваться</a>
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Auth !== 'undefined') {
                Auth.init();
            }
            if (typeof loadFooter !== 'undefined') {
                loadFooter();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (typeof Auth !== 'undefined' && typeof Components !== 'undefined') {
                const result = await Auth.login(email, password);
                
                if (result.success) {
                    window.location.href = '/my_wishlists';
                } else {
                    Components.showAlert(result.error, 'error');
                }
            } else {
                alert('Ошибка загрузки модулей');
            }
        });
    </script>
</body>
</html>
